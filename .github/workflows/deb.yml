name: Build Debian package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    container: swift:6.2-jammy
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          apt-get update
          apt-get install -y dpkg-dev

      - name: Build Debian package
        env:
          DEB_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.1.0' }}
        run: |
          version="${DEB_VERSION#v}"
          DEB_VERSION="$version" scripts/build-deb.sh

      - name: Install and smoke-test Debian package
        run: |
          apt-get install -y ./dist/*.deb
          command -v fantatennis-mac
          fantatennis-mac inspect
          fantatennis-mac doctor
          fantatennis-mac install --destination /tmp/fantatennis-smoke
          test -x /tmp/fantatennis-smoke/run-windows-client.command
          test -f /tmp/fantatennis-smoke/ClientSeed/FT_Launcher.exe
          test -f /tmp/fantatennis-smoke/ClientSeed/FT_Launcher.exe.config

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: fantatennis-mac-deb
          path: dist/*.deb

      - name: Publish release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
